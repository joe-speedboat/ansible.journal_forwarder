# defaults/main.yml
---
# Toggle installation
journal_forwarder_install: True

# Graylog GELF input settings
graylog_gelf_host: "graylog1.sun.bitbull.ch"
graylog_gelf_port: 12201
graylog_gelf_mode: "tcp"

# Fluent-bit workers
graylog_fluent_bit_workers: 2

# Journal forwarder tag for GELF
journal_forwarder_tag: "fb_tag"

...
