---
# handlers/main.yml - Fluent Bit and audit lifecycle handlers

- name: restart fluent-bit
  ansible.builtin.systemd:
    name: fluent-bit
    state: restarted
  when: not ansible_check_mode

- name: reload audit rules
  ansible.builtin.shell: |
    if command -v augenrules >/dev/null 2>&1; then
      augenrules --load
      echo changed
    fi
  args:
    executable: /bin/bash
  changed_when: "'changed' in journal_forwarder_augenrules_reload.stdout"
  register: journal_forwarder_augenrules_reload
  when: not ansible_check_mode
...
