---
- name: Configure Fluent Bit yum repository
  ansible.builtin.yum_repository:
    name: fluent-bit
    description: Fluent Bit
    baseurl: "https://packages.fluentbit.io/{{ fluent_bit_rpm_repo_family_map[ansible_distribution] | default('rockylinux') }}/{{ ansible_distribution_major_version }}/"
    gpgcheck: true
    gpgkey: https://packages.fluentbit.io/fluentbit.key
    repo_gpgcheck: true
    enabled: true
  when: journal_forwarder_install | bool

- name: Install Fluent Bit
  ansible.builtin.dnf:
    name: "{{ pkg_rhel_fluent_bit }}"
    state: present
  notify: restart fluent-bit
  when: journal_forwarder_install | bool

- name: Install audit packages
  ansible.builtin.dnf:
    name: "{{ pkg_rhel_journal_forwarder_audit }}"
    state: present
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool
...