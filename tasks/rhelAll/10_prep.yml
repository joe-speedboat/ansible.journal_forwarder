---
- name: Configure Fluent Bit yum repository
  ansible.builtin.yum_repository:
    name: fluent-bit
    description: Fluent Bit
    baseurl: "https://packages.fluentbit.io/{{ fluent_bit_rpm_repo_family_map[ansible_distribution] | default('rockylinux') }}/{{ ansible_distribution_major_version }}/"
    gpgcheck: true
    gpgkey: https://packages.fluentbit.io/fluentbit.key
    repo_gpgcheck: true
    enabled: true
  when: journal_forwarder_install | bool

...
