---
- name: Install Fluent Bit on RHEL 8 compatible systems
  ansible.builtin.shell: |
    set -o pipefail
    rpm -q fluent-bit >/dev/null 2>&1 || dnf -y install {{ pkg_rhel_fluent_bit | join(' ') }}
  args:
    executable: /bin/bash
  register: journal_forwarder_rhel8_fluent_bit_install
  changed_when: journal_forwarder_rhel8_fluent_bit_install.stdout | length > 0
  notify: restart fluent-bit
  when:
    - journal_forwarder_install | bool
    - ansible_distribution_major_version | int == 8

- name: Install Fluent Bit on RHEL 9+ compatible systems
  ansible.builtin.dnf:
    name: "{{ pkg_rhel_fluent_bit }}"
    state: present
  notify: restart fluent-bit
  when:
    - journal_forwarder_install | bool
    - ansible_distribution_major_version | int >= 9

- name: Install audit packages on RHEL 8 compatible systems
  ansible.builtin.shell: |
    set -o pipefail
    rpm -q {{ pkg_rhel_journal_forwarder_audit | join(' ') }} >/dev/null 2>&1 || dnf -y install {{ pkg_rhel_journal_forwarder_audit | join(' ') }}
  args:
    executable: /bin/bash
  register: journal_forwarder_rhel8_audit_install
  changed_when: journal_forwarder_rhel8_audit_install.stdout | length > 0
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool
    - ansible_distribution_major_version | int == 8

- name: Install audit packages on RHEL 9+ compatible systems
  ansible.builtin.dnf:
    name: "{{ pkg_rhel_journal_forwarder_audit }}"
    state: present
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool
    - ansible_distribution_major_version | int >= 9

...
