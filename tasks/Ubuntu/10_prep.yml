---
- name: Remove obsolete Fluent Bit apt repository key variants
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/fluentbit-keyring.asc
    - /usr/share/keyrings/fluentbit-keyring.gpg
  when: journal_forwarder_install | bool

- name: Remove obsolete Fluent Bit apt repository list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/fluent-bit.list
    state: absent
  when: journal_forwarder_install | bool

- name: Install Ubuntu repository helper packages for Fluent Bit
  ansible.builtin.apt:
    name: "{{ pkg_debian_repository_dependencies }}"
    state: present
    update_cache: true
  when: journal_forwarder_install | bool

- name: Configure Fluent Bit deb822 apt repository
  ansible.builtin.deb822_repository:
    name: fluent-bit
    types:
      - deb
    uris:
      - https://packages.fluentbit.io/ubuntu/{{ ansible_distribution_release }}
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - main
    signed_by: https://packages.fluentbit.io/fluentbit.key
    state: present
    enabled: true
    install_python_debian: true
  register: journal_forwarder_apt_repo
  when: journal_forwarder_install | bool

- name: Update apt cache after Fluent Bit repository change
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_apt_repo is changed

...
