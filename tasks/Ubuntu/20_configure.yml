---
- name: Ensure Fluent Bit storage directory exists
  ansible.builtin.file:
    path: "{{ journal_forwarder_storage_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: journal_forwarder_install | bool

- name: Ensure optional security log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /var/log/nginx
    - /var/log/apache2
    - /var/log/httpd
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_security_files_enabled | bool

- name: Ensure Fluent Bit config directory exists
  ansible.builtin.file:
    path: /etc/fluent-bit
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: journal_forwarder_install | bool

- name: Deploy Fluent Bit parser configuration
  ansible.builtin.template:
    src: parsers-journal-forwarder.conf.j2
    dest: /etc/fluent-bit/parsers-journal-forwarder.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fluent-bit
  when: journal_forwarder_install | bool

- name: Deploy Fluent Bit configuration
  ansible.builtin.template:
    src: fluent-bit.conf.j2
    dest: /etc/fluent-bit/fluent-bit.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fluent-bit
  when: journal_forwarder_install | bool

- name: Remove legacy journal_forwarder audit package rules files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ journal_forwarder_legacy_audit_rules_files }}"
  notify: reload audit rules
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool

- name: Deploy audit package-change rules
  ansible.builtin.template:
    src: audit-package.rules.j2
    dest: "{{ journal_forwarder_audit_rules_file }}"
    owner: root
    group: root
    mode: '0640'
  notify: reload audit rules
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool
...
