---
- name: Install Fluent Bit on RedHat family
  ansible.builtin.shell: |
    set -o pipefail
    rpm -q fluent-bit >/dev/null 2>&1 || dnf -y install {{ pkg_rhel_fluent_bit | join(' ') }}
  args:
    executable: /bin/bash
  register: journal_forwarder_rhel_fluent_bit_install
  changed_when: "'Nothing to do.' not in journal_forwarder_rhel_fluent_bit_install.stdout and journal_forwarder_rhel_fluent_bit_install.rc == 0 and journal_forwarder_rhel_fluent_bit_install.stdout | length > 0"
  notify: restart fluent-bit
  when:
    - journal_forwarder_install | bool
    - ansible_os_family == 'RedHat'

- name: Install Fluent Bit on Debian family
  ansible.builtin.shell: |
    set -o pipefail
    dpkg-query -W -f='${Status}' fluent-bit 2>/dev/null | grep -q 'install ok installed' || apt-get install -y {{ pkg_debian_fluent_bit | join(' ') }}
  args:
    executable: /bin/bash
  register: journal_forwarder_debian_fluent_bit_install
  changed_when: "journal_forwarder_debian_fluent_bit_install.stdout | length > 0"
  notify: restart fluent-bit
  when:
    - journal_forwarder_install | bool
    - ansible_os_family == 'Debian'

- name: Install audit packages on RedHat family
  ansible.builtin.shell: |
    set -o pipefail
    rpm -q {{ pkg_rhel_journal_forwarder_audit | join(' ') }} >/dev/null 2>&1 || dnf -y install {{ pkg_rhel_journal_forwarder_audit | join(' ') }}
  args:
    executable: /bin/bash
  register: journal_forwarder_rhel_audit_install
  changed_when: "journal_forwarder_rhel_audit_install.stdout | length > 0"
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool
    - ansible_os_family == 'RedHat'

- name: Install audit packages on Debian family
  ansible.builtin.shell: |
    set -o pipefail
    dpkg-query -W -f='${Status}' auditd 2>/dev/null | grep -q 'install ok installed' || apt-get install -y {{ pkg_debian_journal_forwarder_audit | join(' ') }}
  args:
    executable: /bin/bash
  register: journal_forwarder_debian_audit_install
  changed_when: "journal_forwarder_debian_audit_install.stdout | length > 0"
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool
    - ansible_os_family == 'Debian'

- name: Ensure Fluent Bit storage directory exists
  ansible.builtin.file:
    path: "{{ journal_forwarder_storage_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: journal_forwarder_install | bool

- name: Deploy Fluent Bit parser configuration
  ansible.builtin.template:
    src: parsers-journal-forwarder.conf.j2
    dest: /etc/fluent-bit/parsers-journal-forwarder.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fluent-bit
  when: journal_forwarder_install | bool

- name: Deploy Fluent Bit configuration
  ansible.builtin.template:
    src: fluent-bit.conf.j2
    dest: /etc/fluent-bit/fluent-bit.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fluent-bit
  when: journal_forwarder_install | bool

- name: Deploy audit package-change rules
  ansible.builtin.template:
    src: audit-package.rules.j2
    dest: "{{ journal_forwarder_audit_rules_file }}"
    owner: root
    group: root
    mode: '0640'
  notify: reload audit rules
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: "{{ svc_audit[ansible_os_family] | default('auditd') }}"
    enabled: true
    state: started
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool

- name: Load active audit rules
  ansible.builtin.command: augenrules --load
  changed_when: false
  when:
    - journal_forwarder_install | bool
    - journal_forwarder_audit_enabled | bool

- name: Enable and start fluent-bit
  ansible.builtin.systemd:
    name: "{{ svc_fluent_bit }}"
    enabled: true
    state: started
  when: journal_forwarder_install | bool

...
